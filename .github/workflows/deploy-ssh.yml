name: Deploy PM2 via SSH

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          username: ${{ secrets.SSH_USER || vars.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD || vars.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            PROJECT_DIR="${{ secrets.PROJECT_DIR }}"
            if [ -z "$PROJECT_DIR" ]; then
              PROJECT_DIR="$HOME/portfolio/portfolio-backend"
            fi

            cd "$PROJECT_DIR"
            git fetch --all --prune
            git checkout main
            git pull origin main

            chmod +x ./server.sh
            ./server.sh

            echo "===== PM2 STATUS ====="
            pm2 status
            echo "===== GO-API LOGS (last 80) ====="
            pm2 logs go-api --lines 80 --nostream || true
            echo "===== AI-SERVICE LOGS (last 80) ====="
            pm2 logs ai-service --lines 80 --nostream || true
