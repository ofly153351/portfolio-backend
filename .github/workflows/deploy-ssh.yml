name: Deploy via Tailscale SSH

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }}

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add Known Host
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF

            set -e

            cd /home/ubuntu/portfolio/portfolio-backend

            git fetch --all --prune
            git checkout main
            git pull origin main

            chmod +x ./server.sh
            set -ex
            whoami
            echo "HOME=$HOME"
            pwd
            which pm2 || true
            which go || true
            which uv || true
            pm2 -v || true
            go version || true
            uv --version || true
            ./server.sh

            echo "===== PM2 STATUS ====="
            pm2 status || true

            echo "===== GO-API LOGS (last 80) ====="
            pm2 logs go-api --lines 80 --nostream || true

            echo "===== AI-SERVICE LOGS (last 80) ====="
            pm2 logs ai-service --lines 80 --nostream || true

          EOF
