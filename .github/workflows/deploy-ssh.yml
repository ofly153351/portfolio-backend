name: Deploy on Main (Root)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Ensure root
        run: |
          if [ "$(id -u)" -ne 0 ]; then
            echo "This workflow must run as root"
            exit 1
          fi

      - name: Pull and run server.sh
        run: |
          set -e
          cd /home/ubuntu/portfolio/portfolio-backend
          git fetch --all --prune
          git checkout main
          git pull origin main
          chmod +x ./server.sh
          ./server.sh
